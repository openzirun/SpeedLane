name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build DMG
        run: ./make_dmg.sh
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SpeedLane-*.dmg
          generate_release_notes: true
